# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml

startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - apiToken
    properties:
      apiToken:
        type: string
        description: "Your OpenPaper API token from openpaper.dev"
  commandFunction: |-
    (config) => ({
      command: "uvx",
      args: ["openpaper-mcp"],
      env: {
        OPENPAPER_API_TOKEN: config.apiToken
      }
    })
